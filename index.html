<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Blogs 中文入口页</title>
  <style>
    :root {
      --bg: #f6f5ef;
      --card: #ffffff;
      --text: #101827;
      --muted: #687385;
      --line: #e7e3d8;
      --accent: #1f6feb;
      --accent-soft: #e8f1ff;
      --shadow: 0 12px 30px rgba(16, 24, 39, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -10%, rgba(31, 111, 235, .12), transparent 28rem),
        linear-gradient(180deg, #faf9f4 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .shell {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 40px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 calc((100vw - min(1180px, calc(100vw - 28px))) / -2);
      padding: 10px calc((100vw - min(1180px, calc(100vw - 28px))) / 2);
      background: rgba(246, 245, 239, .86);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(231, 227, 216, .8);
    }

    .topbar-inner {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: block;
      object-fit: cover;
      background: #fff;
      box-shadow: 0 10px 22px rgba(31, 111, 235, .14);
      flex: 0 0 auto;
    }

    .brand { min-width: 0; flex: 1; }
    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 4.6vw, 46px);
      line-height: 1.02;
      letter-spacing: 0;
    }
    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid #d7e4ff;
      background: #fff;
      color: #1559c9;
      border-radius: 10px;
      padding: 10px 13px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(31, 111, 235, .08);
      white-space: nowrap;
    }
    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn:hover { transform: translateY(-1px); }

    .controls {
      margin: 20px 0 12px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .search {
      position: relative;
    }
    .search input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px 13px 42px;
      background: #fff;
      outline: none;
      box-shadow: 0 8px 18px rgba(16, 24, 39, .04);
    }
    .search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8a94a6;
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 3px;
    }
    .chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 9px 12px;
      color: #42526b;
      cursor: pointer;
      white-space: nowrap;
    }
    .chip.active {
      background: #111827;
      border-color: #111827;
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(16, 24, 39, .06);
      padding: 12px;
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 14px;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      min-height: 136px;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(16, 24, 39, .1);
      border-color: #b7d4ff;
    }

    .cover {
      width: 112px;
      height: 112px;
      border-radius: 14px;
      overflow: hidden;
      background: #e5e7eb;
      align-self: center;
      flex: 0 0 auto;
    }
    .cover canvas { display: block; width: 100%; height: 100%; }

    .body {
      min-width: 0;
      display: grid;
      gap: 8px;
      align-content: center;
    }
    .title-row {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }
    .title-row h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .badge {
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--accent-soft);
      color: #1559c9;
      font-size: 12px;
      white-space: nowrap;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .summary {
      color: #344054;
      font-size: 15px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .update-row {
      min-height: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .update-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      max-width: 100%;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      color: #64748b;
      padding: 5px 9px;
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
    }
    .update-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #94a3b8;
      flex: 0 0 auto;
    }
    .update-pill.checking::before {
      background: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, .14);
    }
    .update-pill.recent {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #15803d;
      font-weight: 700;
    }
    .update-pill.recent::before {
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, .16);
    }
    .update-pill.stale {
      background: #f8fafc;
      color: #64748b;
    }
    .update-pill.failed {
      border-color: #fde68a;
      background: #fffbeb;
      color: #a16207;
    }
    .latest-tip {
      display: none;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      padding: 7px 9px;
      background: linear-gradient(180deg, #f0fdf4, #ffffff);
      color: #166534;
      font-size: 12px;
      line-height: 1.45;
      overflow: hidden;
    }
    .latest-tip.show { display: block; }
    .latest-tip a {
      color: #14532d;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .latest-time {
      color: #15803d;
      font-weight: 500;
      margin-top: 2px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .open-link, .copy-link {
      border: 1px solid #cfe0ff;
      border-radius: 10px;
      padding: 7px 10px;
      color: #1559c9;
      background: #f8fbff;
      cursor: pointer;
      font-size: 13px;
    }
    .open-link {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 50;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(17, 24, 39, .92);
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, bottom .18s ease;
    }
    .toast.show { opacity: 1; bottom: 30px; }

    .empty {
      grid-column: 1 / -1;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 18px;
    }
    .update-summary {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid #dbeafe;
      border-radius: 14px;
      background: rgba(239, 246, 255, .78);
      color: #1e3a8a;
      font-size: 13px;
      line-height: 1.45;
    }
    .update-summary strong { color: #0f172a; }
    .update-summary button {
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      background: #fff;
      color: #1559c9;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    @media (max-width: 820px) {
      .topbar-inner { align-items: flex-start; }
      .toolbar { display: none; }
      .controls { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      .shell { width: min(100vw - 20px, 1180px); padding-top: 12px; }
      .topbar { margin: 0 -10px; padding: 8px 10px; }
      .logo { width: 42px; height: 42px; border-radius: 11px; }
      .brand h1 { font-size: 31px; }
      .brand p { font-size: 14px; }
      .card { grid-template-columns: 92px 1fr; gap: 10px; padding: 10px; min-height: 118px; }
      .cover { width: 92px; height: 92px; }
      .title-row { display: block; }
      .title-row h3 { font-size: 18px; }
      .badge { display: inline-block; margin-top: 6px; }
      .summary { -webkit-line-clamp: 3; font-size: 14px; }
      .actions { margin-top: 2px; }
      .update-summary { display: block; }
      .update-summary button { margin-top: 8px; }
    }
  </style>
</head>

          ctx.beginPath(); ctx.moveTo(42, y); ctx.lineTo(66, y); ctx.moveTo(158, y); ctx.lineTo(182, y); ctx.stroke();
        }
      } else if (key.includes("philosophy") || key.includes("journal") || key.includes("哲学")) {
        for (let i = 0; i < 3; i++) {
          ctx.beginPath(); ctx.ellipse(112, 82, 68 - i * 12, 42 - i * 5, i * .5, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(146, 78, 8, 0, Math.PI * 2); ctx.fill();
      } else {
        const nodes = [[54,60],[94,44],[146,74],[78,116],[142,124]];
        ctx.beginPath();
        nodes.forEach((p, i) => i ? ctx.lineTo(p[0], p[1]) : ctx.moveTo(p[0], p[1]));
        ctx.stroke();
        nodes.forEach(p => { ctx.beginPath(); ctx.arc(p[0], p[1], 8, 0, Math.PI * 2); ctx.fill(); });
      }

      ctx.fillStyle = "rgba(0,0,0,.44)";
      ctx.fillRect(0, 138, size, 86);
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "700 25px Inter, system-ui, sans-serif";
      wrapCanvasText(ctx, coverLabel(source), 112, 174, 180, 30);
      ctx.font = "12px Inter, system-ui, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,.86)";
      ctx.fillText(source.zhCategory.replaceAll(" / ", " · ").slice(0, 16), 112, 204);
    }

    function roundRect(ctx, x, y, w, h, r, fill) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      if (fill) ctx.fill(); else ctx.stroke();
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      const lines = [];
      words.forEach(word => {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      });
      lines.push(line);
      const start = y - (lines.length - 1) * lineHeight / 2;
      lines.slice(0, 2).forEach((item, i) => ctx.fillText(item, x, start + i * lineHeight));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1600);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const input = document.createElement("textarea");
      input.value = text;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.left = "-9999px";
      document.body.appendChild(input);
      input.select();
      document.execCommand("copy");
      document.body.removeChild(input);
    }

    function matchesCategory(source) {
      if (activeCategory === "全部") return true;
      const key = `${source.name} ${source.category} ${source.zhCategory}`;
      return key.includes(activeCategory);

    function matchesQuery(source) {
      if (!query) return true;
      const key = `${source.name} ${source.zhName} ${source.category} ${source.zhCategory} ${source.zhSummary} ${host(source.url)}`.toLowerCase();
      return key.includes(query.toLowerCase());
    }

    function sourceId(source) {
      return host(source.url);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function truncate(value, limit = 46) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      return text.length > limit ? `${text.slice(0, limit - 1)}…` : text;
    }

    function chinaTime(date) {
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function updateStateMarkup(source) {
      const state = updateStates[sourceId(source)] || { status: "checking" };
      if (state.status === "recent") {
        const title = escapeHtml(truncate(state.title, 54));
        const link = escapeHtml(state.link || source.url);
        const time = chinaTime(new Date(state.publishedAt));
        return `
          <div class="update-row"><span class="update-pill recent">24小时内更新</span></div>
          <div class="latest-tip show">
            新文章：<a href="${link}" target="_blank" rel="noopener">${title}</a>
            <div class="latest-time">中国时间 ${time}</div>
          </div>
        `;
      }
      if (state.status === "stale") {
        return `<div class="update-row"><span class="update-pill stale">24h 暂无更新</span></div>`;
      }
      if (state.status === "failed") {
        return `<div class="update-row"><span class="update-pill failed">未能判断更新</span></div>`;
      }
      return `<div class="update-row"><span class="update-pill checking">正在检查更新</span></div>`;

    function updateSummaryMarkup() {
      const states = Object.values(updateStates);
      const recent = states.filter(item => item.status === "recent").length;
      const failed = states.filter(item => item.status === "failed").length;
      const checking = states.filter(item => item.status === "checking").length;
      const checked = states.filter(item => item.status && item.status !== "checking").length;
      const total = sources.length;
      let text = checked < total || checking
        ? `正在按中国时间检查 24 小时内更新：已完成 ${checked}/${total}`
        : `24 小时内有 ${recent} 个来源更新，已完成 ${total}/${total} 个来源检查`;
      if (failed && !checking) {
        text += `，${failed} 个来源将继续用浏览器端兜底`;
      }
      return `
        <div class="update-summary">
          <span><strong>更新雷达</strong> · ${text}</span>

    }

    function loadUpdateCache() {
      try {
        const cached = JSON.parse(localStorage.getItem(updateCacheKey) || "{}");
        if (cached.savedAt && Date.now() - cached.savedAt < cacheMaxAge && cached.states) {
          updateStates = cached.states;
          return true;
        }
      } catch (error) {}
      return false;
    }

    function saveUpdateCache() {
      try {
        localStorage.setItem(updateCacheKey, JSON.stringify({ savedAt: Date.now(), states: updateStates }));
      } catch (error) {}
    }

    function unresolvedSources() {
      return sources.filter(source => {
        const state = updateStates[sourceId(source)];
        return !state || state.status === "failed";
      });
    }

    async function loadRemoteUpdates() {
      try {
        const response = await fetch(`updates.json?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return false;
        const payload = await response.json();
        const generatedAt = Date.parse(payload.generatedAt || "");
        const freshEnough = Number.isFinite(generatedAt) && Date.now() - generatedAt < 8 * 60 * 60 * 1000;
        if (!freshEnough || !payload.states || typeof payload.states !== "object") return false;
        updateStates = payload.states;
        saveUpdateCache();
        renderList();
        repairUnresolvedUpdates();
        return true;
      } catch (error) {
        return false;
      }
    }

    function proxyUrls(url) {
      return [
        url,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        `https://corsproxy.io/?${encodeURIComponent(url)}`
      ];
    }

    function rssJsonUrl(url) {
      return `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
    }

    function jinaReaderUrl(url) {
      return `https://r.jina.ai/${url}`;
    }

    function uniqueUrls(urls) {
      return [...new Set((urls || []).filter(Boolean))];
    }

    function commonFeedCandidates(source) {
      const url = new URL(source.url);
      const origin = url.origin;
      const pathFeed = new URL("feed", source.url.endsWith("/") ? source.url : `${source.url}/`).href;
      return uniqueUrls([
        pathFeed,
        `${origin}/feed/`,
        `${origin}/feed`,
        `${origin}/rss.xml`,
        `${origin}/atom.xml`,
        `${origin}/feed.xml`
      ]);
    }

    function normalizedDateText(text) {
      return String(text || "")
        .replace(/[年月]/g, "-")
        .replace(/日/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function dateCandidatesFromText(text) {
      const value = normalizedDateText(text);
      const patterns = [
        /\b20\d{2}[-/]\d{1,2}[-/]\d{1,2}(?:[T\s]\d{1,2}:\d{2}(?::\d{2})?(?:Z|[+-]\d{2}:?\d{2})?)?\b/g,
        /\b(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Sept|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2},?\s+20\d{2}\b/gi,
        /\b\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Sept|Oct|Nov|Dec)[a-z]*\.?,?\s+20\d{2}\b/gi
      ];
      return patterns.flatMap(pattern => [...value.matchAll(pattern)].map(match => {
        const raw = match[0].replace(/\bSept\b/i, "Sep");
        const parsed = Date.parse(raw);
        return Number.isFinite(parsed) ? parsed : null;
      })).filter(Boolean);
    }

    async function fetchWithTimeout(url, timeout = 11000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal, cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.text();
      } finally {
        clearTimeout(timer);
      }
    }

    async function fetchJsonWithTimeout(url, timeout = 11000) {
      const text = await fetchWithTimeout(url, timeout);
      return JSON.parse(text);
    }

    async function fetchTextFromAny(url) {
      const attempts = proxyUrls(url);
      let lastError;
      for (const attempt of attempts) {
        try {
          const text = await fetchWithTimeout(attempt);
          if (attempt.includes("api.allorigins.win/get?url=")) {
            try {
              const payload = JSON.parse(text);
              return payload.contents || text;
            } catch (error) {
              return text;
            }
          }
          return text;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("无法读取内容");
    }

    async function fetchFeedItems(feedUrl, sourceUrl) {
      try {
        const json = await fetchJsonWithTimeout(rssJsonUrl(feedUrl));
        if (json && Array.isArray(json.items) && json.items.length) {
          return json.items.map(item => ({
            title: item.title || "",
            link: item.link || sourceUrl,
            publishedAt: Date.parse(item.pubDate || item.pubdate || item.published || item.updated || "")
          })).filter(item => item.title && Number.isFinite(item.publishedAt))
            .sort((a, b) => b.publishedAt - a.publishedAt);
        }
      } catch (error) {}
      const xml = await fetchTextFromAny(feedUrl);
      return parseFeed(xml, sourceUrl);
    }

    function nodeText(node, selectors) {
      for (const selector of selectors) {
        const found = node.querySelector(selector);
        if (found && found.textContent.trim()) return found.textContent.trim();
      }
      return "";
    }

    function itemLink(node) {
      const atomLink = node.querySelector("link[href]");
      if (atomLink) return atomLink.getAttribute("href") || "";
      const rssLink = node.querySelector("link");
      if (rssLink && rssLink.textContent.trim()) return rssLink.textContent.trim();
      return "";
    }

    function parseFeed(xmlText, sourceUrl) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, "application/xml");
      if (doc.querySelector("parsererror")) throw new Error("feed 解析失败");
      const nodes = [...doc.querySelectorAll("item, entry")];
      const base = new URL(sourceUrl);
      return nodes.map(node => {
        const title = nodeText(node, ["title"]);
        const rawLink = itemLink(node);
        const rawDate = nodeText(node, ["pubDate", "published", "updated", "dc\\:date", "date"]);
        const publishedAt = rawDate ? Date.parse(rawDate) : NaN;
        let link = rawLink || sourceUrl;
        try { link = new URL(link, base).href; } catch (error) {}
        return { title, link, publishedAt };
      }).filter(item => item.title && Number.isFinite(item.publishedAt))
        .sort((a, b) => b.publishedAt - a.publishedAt);
    }

    function flattenJsonLd(node) {
      if (!node) return [];
      if (Array.isArray(node)) return node.flatMap(flattenJsonLd);
      if (typeof node !== "object") return [];
      return [
        node,
        ...flattenJsonLd(node["@graph"]),
        ...flattenJsonLd(node.itemListElement),
        ...flattenJsonLd(node.mainEntity)
      ];
    }

    function parseJsonLdDates(doc, sourceUrl) {
      const items = [];
      const base = new URL(sourceUrl);
      doc.querySelectorAll('script[type="application/ld+json"]').forEach(script => {
        try {
          const raw = JSON.parse(script.textContent || "{}");
          flattenJsonLd(raw).forEach(node => {
            const date = node.datePublished || node.dateModified || node.uploadDate;
            const title = node.headline || node.name || node.title || (node.item && node.item.name);
            const rawUrl = typeof node.url === "string" ? node.url : (node.mainEntityOfPage && node.mainEntityOfPage["@id"]);
            const publishedAt = Date.parse(date || "");
            if (title && Number.isFinite(publishedAt)) {
              let link = rawUrl || sourceUrl;
              try { link = new URL(link, base).href; } catch (error) {}
              items.push({ title, link, publishedAt });
            }
          });
        } catch (error) {}
      });
      return items;
    }

    function discoverFeedUrlsFromHtml(htmlText, sourceUrl) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, "text/html");
      const base = new URL(sourceUrl);
      const feeds = [];
      doc.querySelectorAll('link[rel~="alternate"][href]').forEach(link => {
        const type = `${link.getAttribute("type") || ""} ${link.getAttribute("title") || ""}`.toLowerCase();
        const href = link.getAttribute("href");
        if (!href || !/(rss|atom|feed|json)/.test(type + href.toLowerCase())) return;
        try { feeds.push(new URL(href, base).href); } catch (error) {}
      });
      return uniqueUrls(feeds);
    }

    async function discoverFeedUrls(source) {
      const htmlCandidates = [source.url, ...(source.fallbackPages || [])];
      const discovered = [];
      for (const pageUrl of htmlCandidates) {
        try {
          const html = await fetchTextFromAny(pageUrl);
          discovered.push(...discoverFeedUrlsFromHtml(html, pageUrl));
        } catch (error) {}
      }
      return uniqueUrls(discovered);
    }

    function nearestArticle(node) {
      let current = node;
      for (let i = 0; i < 6 && current; i++) {
        if (current.matches && current.matches("article, li, section, div")) return current;
        current = current.parentElement;
      }
      return node.parentElement || node;
    }

    function parseHtmlLatest(htmlText, sourceUrl) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, "text/html");
      const base = new URL(sourceUrl);
      const items = parseJsonLdDates(doc, sourceUrl);
      const metaDate = doc.querySelector([
        'meta[property="article:published_time"]',
        'meta[property="article:modified_time"]',
        'meta[property="og:updated_time"]',
        'meta[name="article:published_time"]',
        'meta[name="pubdate"]',
        'meta[name="publishdate"]',
        'meta[name="date"]',
        'meta[name="dc.date"]',
        'meta[name="parsely-pub-date"]'
      ].join(", "));
      const metaTitle = doc.querySelector('meta[property="og:title"], meta[name="twitter:title"]');
      if (metaDate && metaDate.content) {
        const publishedAt = Date.parse(metaDate.content);
        if (Number.isFinite(publishedAt)) {
          items.push({
            title: (metaTitle && metaTitle.content) || doc.title || host(sourceUrl),
            link: sourceUrl,
            publishedAt
          });
        }
      }
      doc.querySelectorAll("article, li, section, [class*='post'], [class*='article'], [class*='entry'], [class*='card']").forEach(root => {
        const text = root.textContent || "";
        const dates = dateCandidatesFromText(text).filter(time => time <= Date.now() + 2 * 24 * 60 * 60 * 1000);
        if (!dates.length) return;
        const publishedAt = Math.max(...dates);
        const linkNode = root.querySelector("a[href]");
        const titleNode = root.querySelector("h1, h2, h3, [class*='title'], a[href]");
        const title = titleNode ? titleNode.textContent.replace(/\s+/g, " ").trim() : "";
        if (!title || title.length < 4 || title.length > 160) return;
        let link = linkNode ? linkNode.getAttribute("href") : sourceUrl;
        try { link = new URL(link, base).href; } catch (error) {}
        items.push({ title, link, publishedAt });
      });
      doc.querySelectorAll("time[datetime], time").forEach(timeNode => {
        const rawDate = timeNode.getAttribute("datetime") || timeNode.textContent;
        const publishedAt = Date.parse(rawDate || "") || Math.max(...dateCandidatesFromText(rawDate));
        if (!Number.isFinite(publishedAt)) return;
        const root = nearestArticle(timeNode);
        const linkNode = root.querySelector("a[href]") || doc.querySelector("a[href]");
        let link = linkNode ? linkNode.getAttribute("href") : sourceUrl;
        try { link = new URL(link, base).href; } catch (error) {}
        const titleNode = root.querySelector("h1, h2, h3, a[href]") || linkNode;
        const title = titleNode ? titleNode.textContent.replace(/\s+/g, " ").trim() : doc.title;
        if (title) items.push({ title, link, publishedAt });
      });
      return items.filter(item => item.title && Number.isFinite(item.publishedAt))
        .sort((a, b) => b.publishedAt - a.publishedAt);
    }

    function parseReaderLatest(text, sourceUrl) {
      const lines = text.split(/\n+/).map(line => line.trim()).filter(Boolean);
      const items = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const dateMatches = dateCandidatesFromText(line);
        if (!dateMatches.length) continue;
        const publishedAt = Math.max(...dateMatches);
        if (!Number.isFinite(publishedAt)) continue;
        let title = "";
        let link = sourceUrl;
        for (let j = Math.max(0, i - 4); j <= Math.min(lines.length - 1, i + 2); j++) {
          const linkMatch = lines[j].match(/\[([^\]]{4,120})\]\((https?:\/\/[^)]+)\)/);
          if (linkMatch) {
            title = linkMatch[1];
            link = linkMatch[2];
            break;
          }
          if (!title && lines[j].length > 8 && lines[j].length < 120 && !dateCandidatesFromText(lines[j]).length) {
            title = lines[j].replace(/^#+\s*/, "");
          }
        }
        if (title) items.push({ title, link, publishedAt });
      }
      return items.sort((a, b) => b.publishedAt - a.publishedAt);
    }

    async function fetchPageLatest(source) {
      const htmlCandidates = [source.url, ...(source.fallbackPages || [])];
      for (const pageUrl of htmlCandidates) {
        try {
          const html = await fetchTextFromAny(pageUrl);
          const items = parseHtmlLatest(html, pageUrl);
          if (items.length) return items;
        } catch (error) {}
      }
      for (const pageUrl of htmlCandidates) {
        try {
          const text = await fetchWithTimeout(jinaReaderUrl(pageUrl), 15000);
          const items = parseReaderLatest(text, pageUrl);
          if (items.length) return items;
        } catch (error) {}
      }
      return [];
    }

    async function checkSourceUpdate(source) {
      const id = sourceId(source);
      updateStates[id] = { status: "checking" };
      renderList();
      const attemptedFeeds = new Set();

      async function tryFeeds(feedUrls) {
        for (const feedUrl of uniqueUrls(feedUrls)) {
          if (attemptedFeeds.has(feedUrl)) continue;
          attemptedFeeds.add(feedUrl);
          try {
            const items = await fetchFeedItems(feedUrl, source.url);
            const latest = items[0];
            if (!latest) continue;
            const age = Date.now() - latest.publishedAt;
            updateStates[id] = age >= 0 && age <= recentWindowMs
              ? { status: "recent", title: latest.title, link: latest.link, publishedAt: latest.publishedAt, method: "feed", feed: feedUrl }
              : { status: "stale", title: latest.title, link: latest.link, publishedAt: latest.publishedAt, method: "feed", feed: feedUrl };
            saveUpdateCache();
            renderList();
            return true;
          } catch (error) {
            // Try the next candidate feed quietly.
          }
        }
        return false;
      }

      if (await tryFeeds(source.feeds || [])) return;

      try {
        const discoveredFeeds = await discoverFeedUrls(source);
        if (await tryFeeds(discoveredFeeds)) return;
      } catch (error) {}

      if (await tryFeeds(commonFeedCandidates(source))) return;

      try {
        const pageItems = await fetchPageLatest(source);
        const latest = pageItems[0];
        if (latest) {
          const age = Date.now() - latest.publishedAt;
          updateStates[id] = age >= 0 && age <= recentWindowMs
            ? { status: "recent", title: latest.title, link: latest.link, publishedAt: latest.publishedAt, method: "page" }
            : { status: "stale", title: latest.title, link: latest.link, publishedAt: latest.publishedAt, method: "page" };
          saveUpdateCache();
          renderList();
          return;
        }
      } catch (error) {}
      updateStates[id] = { status: "failed", checkedAt: Date.now() };
      saveUpdateCache();
      renderList();
    }

    async function checkSources(sourceList, concurrency = 4) {
      const queue = [...sourceList];
      const workers = Array.from({ length: Math.min(concurrency, Math.max(queue.length, 1)) }, async () => {
        while (queue.length) {
          const source = queue.shift();
          await checkSourceUpdate(source);
        }
      });
      await Promise.all(workers);
      saveUpdateCache();
      renderList();
    }

    async function repairUnresolvedUpdates() {
      if (repairInProgress) return;
      const targets = unresolvedSources();
      if (!targets.length) return;
      repairInProgress = true;
      try {
        await checkSources(targets, 3);
      } finally {
        repairInProgress = false;
      }
    }

    async function checkRecentUpdates(options = {}) {
      if (!options.force && await loadRemoteUpdates()) {
        return;
      }
      if (!options.force && loadUpdateCache()) {
        renderList();
        repairUnresolvedUpdates();
        return;
      }
      updateStates = Object.fromEntries(sources.map(source => [sourceId(source), { status: "checking" }]));
      renderList();
      await checkSources(sources, 4);
    }

    renderChips();
    renderList();
    checkRecentUpdates();
  </script>
</body>
